version: "3.9"

# Isolated test environment - NOT for development
# Spin up with: docker compose -f docker-compose.test.yml up

services:
  test-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://ehr:ehr@test-postgres:5432/ehr_test
      - REDIS_URL=redis://test-redis:6379
      - JWT_SECRET=test-jwt-secret-min-32-characters-long
      - ENCRYPTION_KEY=0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNO
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    networks:
      - test-network
    command: npm run test:e2e

  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ehr
      POSTGRES_PASSWORD: ehr
      POSTGRES_DB: ehr_test
    ports:
      - "5433:5432" # Different port to avoid dev conflict
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - test-network

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" # Different port to avoid dev conflict
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - test-network

volumes:
  test_postgres_data:

networks:
  test-network:
    driver: bridge
